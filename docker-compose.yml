services:
  api:
    build:
      context: .
      dockerfile: HomeGroup.API/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=homegroup;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=homegroup-crm
      - Jwt__Audience=homegroup-crm-client
      - Cors__AllowedOrigins__0=${FRONTEND_URL}
      - SuperAdmin__Email=${SUPERADMIN_EMAIL}
      - SuperAdmin__Password=${SUPERADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=homegroup
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: ../homegroup-crm-telegrambot
      dockerfile: Dockerfile
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_BASE_URL=http://api:8080
      - API_EMAIL=${SUPERADMIN_EMAIL}
      - API_PASSWORD=${SUPERADMIN_PASSWORD}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
